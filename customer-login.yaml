spring:
  application:
    name: customer-login

  jpa:
    database: mysql
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:mysql://localhost:3306/customerdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  tracing:
    sampling:
      probability: 1.0

server:
    port: 8081
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.hibernate.sql: debug
    org.hibernate.tool.schema: debug


